name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  TEST_IMAGE: bean-server:test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Verify installed Python modules
        run: |
          docker run --rm "${TEST_IMAGE}" python -c '
          import importlib.metadata
          import json

          import fava
          import beanprice
          import beancount_periodic
          import fava_portfolio_returns
          import fava_dashboards

          direct_url = importlib.metadata.distribution("beanprice").read_text("direct_url.json")
          if not direct_url:
              raise SystemExit("beanprice direct_url.json missing")
          url = json.loads(direct_url).get("url", "")
          expected_url = "https://github.com/gengar-zyx/beanprice.git"
          if url != expected_url:
              raise SystemExit(f"unexpected beanprice source: {url}")

          print("imports ok")
          '

      - name: Smoke test Fava startup
        run: |
          set -euo pipefail
          docker run -d --rm --name fava-smoke \
            -p 127.0.0.1:15000:5000 \
            -v "${GITHUB_WORKSPACE}/test:/ledger:ro" \
            "${TEST_IMAGE}"
          trap 'docker stop fava-smoke >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsSI http://127.0.0.1:15000/ >/tmp/fava-headers; then
              cat /tmp/fava-headers
              exit 0
            fi
            sleep 1
          done

          docker logs fava-smoke
          exit 1

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
