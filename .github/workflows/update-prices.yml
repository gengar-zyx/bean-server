name: Update prices

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build price updater image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: bean-server:price-updater
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Update prices
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/test:/ledger" \
            -e BACKFILL=false \
            -e UPDATE_RATE=daily \
            -e WORKERS=4 \
            bean-server:price-updater \
            update-prices

      - name: Validate ledger
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/test:/ledger:ro" \
            bean-server:price-updater \
            bean-check /ledger/main.bean

      - name: Commit price updates
        run: |
          set -euo pipefail

          if git diff --quiet -- test/prices.bean; then
            echo "No price changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/prices.bean
          git commit -m "Update commodity prices"
          git push
